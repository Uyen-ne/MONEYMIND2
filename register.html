<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Đăng Ký</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        <div class="bottom-background"></div>

        <div class="login-wrapper">
            <div class="login-card">
                <h1 class="login-title">ĐĂNG KÝ</h1>
                
                <form action="#" method="post">
                    <div class="input-group">
                        <label for="fullname">HỌ TÊN</label>
                        <input type="text" id="fullname" name="fullname" required>
                    </div>

                    <div class="input-group">
                        <label for="username">EMAIL/SỐ ĐIỆN THOẠI</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    
                    <div class="input-row">
                        <div class="input-group">
                            <label for="password">MẬT KHẨU</label>
                            <input type="password" id="password" name="password" required>
                        </div>
                        <div class="input-group">
                            <label for="re-password">NHẬP LẠI MẬT KHẨU</label>
                            <input type="password" id="re-password" name="re-password" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="login-button">ĐĂNG KÝ</button>
                </form>
                
                <p class="signup-text">
                    Bạn đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
