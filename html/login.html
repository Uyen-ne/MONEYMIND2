<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Đăng Nhập</title>

    <link rel="stylesheet" href="../css/common.css"> 
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/responsive.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        <div class="bottom-background">
            </div>

        <div class="login-wrapper">
            <div class="login-card">
                <h1 class="login-title">ĐĂNG NHẬP</h1>
                
                <form action="#" method="post">
                    <div class="input-group">
                        <label for="username">EMAIL/SỐ ĐIỆN THOẠI</label>
                        <input type="text" id="username" name="username" required>
                        <p id="emailError" style="color: red; display: none; font-size: 12px; margin-top: 5px; font-weight: 500;">* Email sai định dạng (Ví dụ: ten@gmail.com)</p>
                    </div>
                    
                    <div class="input-group">
                        <label for="password">MẬT KHẨU</label>
                        <input type="password" id="password" name="password" required>
                        <p id="passError" style="color: red; display: none; font-size: 12px; margin-top: 5px; font-weight: 500;">* Mật khẩu phải từ 8 ký tự, có 1 chữ IN HOA và 1 số</p>
                    </div>
                    
                    <button type="submit" id="submitBtn" class="login-button">ĐĂNG NHẬP</button>
                </form>
                
                
               <p class="signup-text">
                Bạn chưa có tài khoản? <a href="register.html">Đăng kí ngay</a>
               </p>
            </div>
        </div>
    </div>

   

</body>
</html>


<script>
        document.getElementById('submitBtn').addEventListener('click', function(event) {
            let hopLe = true; 
            
            // Lấy dữ liệu từ ID username và password của bạn
            const email = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            // 1. Kiểm tra Email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                document.getElementById('emailError').style.display = 'block';
                hopLe = false; 
            } else {
                document.getElementById('emailError').style.display = 'none'; 
            }

            // 2. Kiểm tra Mật khẩu
            const passRegex = /^(?=.*[A-Z])(?=.*\d).{8,}$/;
            if (!passRegex.test(pass)) {
                document.getElementById('passError').style.display = 'block';
                hopLe = false;
            } else {
                document.getElementById('passError').style.display = 'none';
            }
            // 3. Xử lý sau khi kiểm tra xong
            if (!hopLe) {
                event.preventDefault(); 
            } else {
                event.preventDefault(); 
                window.location.href = "home.html"; 
            }
        });
    </script>
</body>
</html>
