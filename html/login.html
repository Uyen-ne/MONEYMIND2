<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Đăng Nhập</title>

    <link rel="stylesheet" href="../css/common.css"> 
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/responsive.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        <div class="bottom-background">
            </div>

        <div class="login-wrapper">
            <div class="login-card">
                <h1 class="login-title">ĐĂNG NHẬP</h1>
                
                <form action="#" method="post">
                    <div class="input-group">
                        <label for="username">EMAIL</label>
                        <input type="text" id="username" name="username" required>
                        <p id="emailError" style="color: red; display: none; font-size: 12px; margin-top: 5px; font-weight: 500;">* Email sai định dạng (Ví dụ: ten@gmail.com)</p>
                    </div>
                    
                    <div class="input-group">
                        <label for="password">MẬT KHẨU</label>
                        <div style="position:relative;">
                            <input type="password" id="password" name="password" required style="padding-right:40px;">
                            <span onclick="togglePassword('password', this)" 
                                style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:18px; color:#aaa;">👁</span>
                        </div>
                        <p id="passError" style="color: red; display: none; font-size: 12px; margin-top: 5px; font-weight: 500;">* Mật khẩu phải từ 8 ký tự, có 1 chữ IN HOA và 1 số</p>
                    </div>
                    
                    <button type="submit" id="submitBtn" class="login-button">ĐĂNG NHẬP</button>
                </form>
                
                
               <p class="signup-text">
                Bạn chưa có tài khoản? <a href="register.html">Đăng kí ngay</a>
               </p>
            </div>
        </div>
    </div>

   

</body>
</html>
<script src="../js/api.js"></script>
<script src="../js/login.js"></script>

</body>
</html>
