<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ví của tôi - MoneyMind</title>
    
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/wallet.css">
    <link rel="stylesheet" href="../css/modal.css">
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
    <div class="logo">
         <a href="home.html" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
        <img src="../assets/icon/logo.png" alt="MoneyMind">
        <span>MoneyMind</span>
        </a>
    </div>

    <div class="nav-right-group">
        <ul class="nav-links">
           <li><a href="category.html">Danh mục</a></li>
            <li><a href="transaction.html">Giao dịch</a></li>
            <li><a href="goal.html">Mục tiêu</a></li>
            <li><a href="wallet.html" class="active-link">Ví của tôi</a></li>
        </ul>
        
        <div class="nav-icons">
            <img src="../assets/icon/bell.png" alt="Notification" class="icon">
            <img src="../assets/icon/avatar.png" alt="User" class="avatar-img">
        </div>  
    </div>
    </nav>

    <main class="wallet-container">
    <h1>VÍ CỦA TÔI</h1>

    <div class="container">
        <header class="header-card">
            <div class="balance-info">
                <div class="user-avatar-container">
                     <img src="../assets/icon/avatar.png" alt="Avatar" class="user-avatar-img">
                 </div>
             <div>
        <p>Số dư hiện tại</p>
        <h2>200.000.000 đ</h2>
    </div>
</div>
            <div class="alert-info">
                <p>Chi tiêu tháng 4 này đã <span class="highlight">tăng 50%</span> so với tháng 3 trước!</p>
            </div>
        </header>

        <section class="wallet-section" style="margin-top: 30px; margin-bottom: 30px ;" >
            <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Ví hiện tại</h2>
                <button class="add-wallet-btn" onclick="showModal('addWalletModal')" style="padding: 8px 15px; border-radius: 8px; border: none; background-color: #28b463; color: white; cursor: pointer; font-weight: bold;">+ Thêm ví</button> 
            </div>
           <!-- DANH SÁCH VÍ  -->
                <div class="wallet-list-container" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">

                    <!-- Item Ví 1 -->
                    <div class="wallet-item" style="display: flex; justify-content: space-between; align-items: center; background-color: #e6e6e6; padding: 15px 20px; border-radius: 12px;">
                        
                        <!-- Cột trái: Tên & Số tiền -->
                        <div class="wallet-info" style="display: flex; flex-direction: column; gap: 5px; text-align: left;">
                            <span style="font-weight: bold; font-size: 16px; color: #333;">Tiền mặt</span>
                            <span style="font-size: 15px; color: #555;">Số dư: <b>100.000 vnđ</b></span>
                        </div>

                        <!-- Cột phải: 2 Nút Sửa / Xóa -->
                        <div class="wallet-actions" style="display: flex; gap: 10px;">
                            <button class="edit-btn" onclick="showModal('editWalletModal')" style="padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; background: white; cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: inherit;">
                                ✏️ Sửa
                            </button>
                            <button class="delete-btn" style="padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; background: white; cursor: pointer; display: flex; align-items: center; gap: 5px; color: #d32f2f; font-family: inherit;">
                                🗑️ Xóa
                            </button>
                        </div>
                    </div>

                    <!-- Item Ví 2 -->
                    <div class="wallet-item" style="display: flex; justify-content: space-between; align-items: center; background-color: #e6e6e6; padding: 15px 20px; border-radius: 12px;">
                        <div class="wallet-info" style="display: flex; flex-direction: column; gap: 5px; text-align: left;">
                            <!-- Hiển thị gộp tên Ngân hàng vào đây luôn -->
                            <span style="font-weight: bold; font-size: 16px; color: #333;">BIDV</span>
                            <span style="font-size: 15px; color: #555;">Số dư: <b>100.000 vnđ</b></span>
                        </div>
                        <div class="wallet-actions" style="display: flex; gap: 10px;">
                            <button class="edit-btn" onclick="showModal('editWalletModal')" style="padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; background: white; cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: inherit;">
                                ✏️ Sửa
                            </button>
                            <button class="delete-btn" style="padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; background: white; cursor: pointer; display: flex; align-items: center; gap: 5px; color: #d32f2f; font-family: inherit;">
                                🗑️ Xóa
                            </button>
                        </div>
                    </div>

                    <!-- Item Ví 3 -->
                    <div class="wallet-item" style="display: flex; justify-content: space-between; align-items: center; background-color: #e6e6e6; padding: 15px 20px; border-radius: 12px;">
                        <div class="wallet-info" style="display: flex; flex-direction: column; gap: 5px; text-align: left;">
                            <span style="font-weight: bold; font-size: 16px; color: #333;">MOMO</span>
                            <span style="font-size: 15px; color: #555;">Số dư: <b>100.000 vnđ</b></span>
                        </div>
                        <div class="wallet-actions" style="display: flex; gap: 10px;">
                            <button class="edit-btn" onclick="showModal('editWalletModal')" style="padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; background: white; cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: inherit;">
                                ✏️ Sửa
                            </button>
                            <button class="delete-btn" style="padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; background: white; cursor: pointer; display: flex; align-items: center; gap: 5px; color: #d32f2f; font-family: inherit;">
                                🗑️ Xóa
                            </button>
                        </div>
                    </div>

                </div>
                        <!-- MODAL THÊM VÍ -->
          
                <div id="addWalletModal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0,0,0,0.5); z-index: 9999;">
                    
                    <!-- Khung trắng chứa nội dung căn giữa tuyệt đối -->
                    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; box-sizing: border-box; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
                        
                        <h3 style="margin: 0 0 20px 0; text-align: center; font-size: 20px; color: #333;">Thêm ví mới</h3>
                        
                        <!-- Ô nhập Tên ví (Ép hiển thị dọc) -->
                        <div style="margin-bottom: 15px; display: block; text-align: left;">
                            <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">Tên ví</label>
                            <input type="text" id="new-wallet-name" placeholder="VD: Tiền mặt, Vietcombank, Momo..." style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-family: inherit; display: block;" />
                        </div>

                        <!-- Ô nhập Số tiền (Đã đổi sang kiểu số và bước nhảy 1000) -->
                        <div style="margin-bottom: 25px; display: block; text-align: left;">
                            <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">Số tiền</label>
                            <input type="number" step="1000" id="new-wallet-amount" placeholder="Nhập số dư ban đầu (VNĐ)" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-family: inherit; display: block;" />
                        </div>

                        <!-- Các nút hành động (Dàn ngang đều nhau) -->
                        <div style="display: flex; gap: 10px;">
                            <button onclick="hideModal('addWalletModal')" style="flex: 1; padding: 12px; border-radius: 8px; border: none; background: #eee; cursor: pointer; font-weight: bold; color: #333;">HỦY</button>
                            <button onclick="hideModal('addWalletModal')" style="flex: 1; padding: 12px; border-radius: 8px; border: none; background: #f39c12; color: white; cursor: pointer; font-weight: bold;">LƯU</button>
                        </div>
                        
                    </div>
                </div>

                </div>
            </div>
        </section>

        <!-- MODAL CHỈNH SỬA VÍ -->
        <div id="editWalletModal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0,0,0,0.5); z-index: 9999;">
            
            <!-- Khung trắng chứa nội dung căn giữa tuyệt đối -->
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; box-sizing: border-box; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
                
                <h3 style="margin: 0 0 20px 0; text-align: center; font-size: 20px; color: #333;">Chỉnh sửa ví</h3>
                
                <!-- Ô nhập Tên ví (Để trống chờ Backend) -->
                <div style="margin-bottom: 15px; display: block; text-align: left;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">Tên ví</label>
                    <input type="text" id="edit-wallet-name" placeholder="Dữ liệu sẽ load ở đây..." style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-family: inherit; display: block;" />
                </div>

                <!-- Ô nhập Số tiền (Để trống chờ Backend) -->
                <div style="margin-bottom: 25px; display: block; text-align: left;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">Số tiền</label>
                    <input type="number" step="1000" id="edit-wallet-amount" placeholder="Số tiền sẽ load ở đây..." style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-family: inherit; display: block;" />
                </div>

                <!-- Các nút hành động (Dàn ngang đều nhau) -->
                <div style="display: flex; gap: 10px;">
                    <button onclick="hideModal('editWalletModal')" style="flex: 1; padding: 12px; border-radius: 8px; border: none; background: #eee; cursor: pointer; font-weight: bold; color: #333;">HỦY</button>
                    <button onclick="hideModal('editWalletModal')" style="flex: 1; padding: 12px; border-radius: 8px; border: none; background: #f39c12; color: white; cursor: pointer; font-weight: bold;">CẬP NHẬT</button>
                </div>
                
            </div>
        </div>
    </main>

    <script src="../js/global-menu.js"></script>
    <script src="../js/wallet.js"></script>
</body>
</html>
