<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Mục - MoneyMind</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/category.css">
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="../css/modal.css">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <a href="home.html" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
                <img src="../assets/icon/logo.png" alt="MoneyMind">
                <span>MoneyMind</span>
            </a>
        </div>
        <div class="nav-right-group">
            <ul class="nav-links">
                <li><a href="category.html" class="active-link">Danh mục</a></li>
                <li><a href="transaction.html">Giao dịch</a></li>
                <li><a href="goal.html">Mục tiêu</a></li>
            </ul>
            <div class="nav-icons">
                <img src="../assets/icon/bell.png" alt="Notification" class="icon">
                <img src="../assets/icon/avatar.png" alt="User" class="avatar-img">
            </div>
        </div>
    </nav>

    <main class="category-container">
        <h1 class="page-title">QUẢN LÝ DANH MỤC</h1>

        <div class="top-actions">
            <button class="btn-pill-gray" onclick="showModal('addCategoryModal')">THÊM DANH MỤC</button>
        </div>

        <!-- Tiền vào -->
        <section class="category-section">
            <h2 class="section-heading">TIỀN VÀO</h2>
            <div id="incomeCategories"></div>
        </section>

        <!-- Tiền ra -->
        <section class="category-section">
            <h2 class="section-heading">TIỀN RA</h2>
            <div id="expenseCategories"></div>
        </section>

        <!-- MODAL THÊM DANH MỤC -->
        <div class="modal-overlay" id="addCategoryModal">
            <div class="modal-card form-card">
                <h2 class="form-title">Thêm danh mục</h2>

                <div class="form-group">
                    <label>CHỌN DANH MỤC</label>
                    <div class="preset-grid" id="presetGrid">
                    <!-- Render từ JS -->
                    </div>
                </div>

                <div class="form-group">
                    <label>TẠO DANH MỤC</label>
                    <input type="text" class="form-input" id="catName" placeholder="Nhập tên danh mục khác...">
                </div>

                <div class="form-group">
                    <label>NGUỒN TIỀN</label>
                    <div class="source-selector-row">
                        <button class="source-btn source-in" onclick="selectCatType('income', this)">TIỀN VÀO</button>
                        <button class="source-btn source-out" onclick="selectCatType('expense', this)">TIỀN RA</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>MÀU SẮC</label>
                    <div class="color-selector-row">
                        <div class="color-circle" style="background-color:#FFD6D6;" onclick="selectColor('#FFD6D6', this)"></div>
                        <div class="color-circle" style="background-color:#FEF7CC;" onclick="selectColor('#FEF7CC', this)"></div>
                        <div class="color-circle" style="background-color:#DDF7D3;" onclick="selectColor('#DDF7D3', this)"></div>
                        <div class="color-circle" style="background-color:#D5FAFA;" onclick="selectColor('#D5FAFA', this)"></div>
                        <div class="color-circle" style="background-color:#DFD3FB;" onclick="selectColor('#DFD3FB', this)"></div>
                        <div class="color-circle" style="background-color:#FBD3E9;" onclick="selectColor('#FBD3E9', this)"></div>
                    </div>
                </div>

                <div class="modal-btns mt-30">
                    <button class="btn-form-cancel" onclick="closeModal('addCategoryModal')">HỦY</button>
                    <button class="btn-form-apply" onclick="addCategory()">LƯU</button>
                </div>
            </div>
        </div>

        <!-- MODAL SỬA DANH MỤC -->
        <div class="modal-overlay" id="editCategoryModal">
            <div class="modal-card form-card">
                <h2 class="form-title">Sửa danh mục</h2>
                <input type="hidden" id="editCatId">

                <div class="form-group">
                    <label>TÊN DANH MỤC</label>
                    <input type="text" class="form-input" id="editCatName" placeholder="Nhập tên danh mục">
                </div>

                <div class="form-group">
                    <label>MÀU SẮC</label>
                    <div class="color-selector-row">
                        <div class="color-circle" style="background-color:#FFD6D6;" onclick="selectEditColor('#FFD6D6', this)"></div>
                        <div class="color-circle" style="background-color:#FEF7CC;" onclick="selectEditColor('#FEF7CC', this)"></div>
                        <div class="color-circle" style="background-color:#DDF7D3;" onclick="selectEditColor('#DDF7D3', this)"></div>
                        <div class="color-circle" style="background-color:#D5FAFA;" onclick="selectEditColor('#D5FAFA', this)"></div>
                        <div class="color-circle" style="background-color:#DFD3FB;" onclick="selectEditColor('#DFD3FB', this)"></div>
                        <div class="color-circle" style="background-color:#FBD3E9;" onclick="selectEditColor('#FBD3E9', this)"></div>
                    </div>
                </div>

                <div class="modal-btns mt-30">
                    <button class="btn-form-cancel" onclick="closeModal('editCategoryModal')">HỦY</button>
                    <button class="btn-form-apply" onclick="updateCategory()">LƯU</button>
                </div>
            </div>
        </div>

    </main>

    <script src="../js/api.js"></script>
    <script src="../js/global-menu.js"></script>
    <script src="../js/model.js"></script>
    <script src="../js/category.js"></script>
</body>
</html>
