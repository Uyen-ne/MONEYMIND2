<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyMind - Trang chủ</title>
    
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="../css/modal.css">
    <link rel="stylesheet" href="../css/responsive.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="home-bg">

    <nav class="navbar">
        <div class="logo">
            <img src="../assets/icon/logo.png" alt="MoneyMind">
            <span>MoneyMind</span>
        </div>
        <div class="nav-right-group">
            <ul class="nav-links">
                <li><a href="category.html">Danh mục</a></li>
                <li><a href="transaction.html">Giao dịch</a></li>
                <li><a href="goal.html">Mục tiêu</a></li>
            </ul>
            <div class="nav-icons">
                <img src="../assets/icon/bell.png" alt="Notification" class="icon">
                <img src="../assets/icon/avatar.png" alt="User" class="avatar-img">
            </div>
        </div>
    </nav>

    <div class="container">
        <header class="header-card">
            <div class="balance-info">
                <div class="user-avatar-container">
                    <img src="../assets/icon/avatar.png" alt="Avatar" class="user-avatar-img">
                </div>
                <div>
                    <p>Số dư hiện tại</p>
                    <h2 id="totalBalance">0 đ</h2>
                </div>
            </div>
            <div class="alert-info">
                <p id="alertText">Chi tiêu tháng này đang được tải...</p>
            </div>
        </header>

        <section class="stats-section">
            <div class="stats-left">
                <div class="stats-header">
                    <h2>Thống kê chung</h2>
                    <div class="filter-container">
                        <button class="filter-btn" id="filterBtn">Bộ lọc</button>
                        <div class="filter-popup" id="filterMenu">
                            <p class="filter-title">Lọc theo thời gian:</p>
                            <div class="filter-options">
                                <button class="opt-btn color-day" onclick="loadStats('day')">Theo ngày</button>
                                <button class="opt-btn color-week" onclick="loadStats('week')">Theo tuần</button>
                                <button class="opt-btn color-month" onclick="loadStats('month')">Theo tháng</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Stat items sẽ được render từ JS -->
                <div id="statItems"></div>
            </div>

            <div class="stats-right">
                <canvas id="myPieChart"></canvas>
            </div>
        </section>

        <section class="recent-transactions">
            <h3>Giao dịch gần đây</h3>
            <div class="trans-list" id="transList">
                <p style="color:#aaa">Đang tải...</p>
            </div>
        </section>
    </div>

    <script src="../js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="../js/chart-setup.js"></script>
    <script src="../js/global-menu.js"></script>
    <script src="../js/home.js"></script>

    <script>
        const filterBtn = document.getElementById('filterBtn');
        const filterMenu = document.getElementById('filterMenu');

        filterBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            filterMenu.classList.toggle('active');
        });

        document.addEventListener('click', function() {
            filterMenu.classList.remove('active');
        });
    </script>

</body>
</html>
