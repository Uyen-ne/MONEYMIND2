<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi Mật Khẩu - MoneyMind</title>
    
    <link rel="stylesheet" href="../css/common.css"> 
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/responsive.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="change-password-page">

    <div class="main-container">
        <div class="bottom-background"></div>

        <div class="login-wrapper">
            <div class="login-card">
                <h1 class="login-title">ĐỔI MẬT KHẨU</h1>
                
                <form action="#" method="post">
                    <div class="input-group">
                        <label for="old-pass">MẬT KHẨU CŨ</label>
                        <input type="password" id="old-pass" name="old-pass" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="new-pass">MẬT KHẨU MỚI</label>
                        <input type="password" id="new-pass" name="new-pass" required>
                        <p id="newPassError" style="color: red; display: none; font-size: 12px; margin-top: 5px; font-weight: 500;">* Mật khẩu mới phải từ 8 ký tự, có 1 chữ IN HOA và 1 số</p>
                    </div>

                    <div class="input-group">
                        <label for="confirm-pass">NHẬP LẠI MẬT KHẨU MỚI</label>
                        <input type="password" id="confirm-pass" name="confirm-pass" required>
                        <p id="confirmPassError" style="color: red; display: none; font-size: 12px; margin-top: 5px; font-weight: 500;">* Mật khẩu nhập lại không khớp!</p>
                    </div>
                    <button type="submit" id="submitChangeBtn" class="login-button">XÁC NHẬN</button>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/change-pass.js"></script>

</body>
</html>
