<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Đăng Ký</title>
    
    <link rel="stylesheet" href="../css/common.css"> 
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/responsive.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        <div class="bottom-background"></div>

        <div class="login-wrapper">
            <div class="login-card">
                <h1 class="login-title">ĐĂNG KÝ</h1>
                
                <form action="#" method="post">
                    <div class="input-group">
                        <label for="fullname">HỌ TÊN</label>
                        <input type="text" id="fullname" name="fullname" required>
                    </div>

                    <div class="input-group">
                        <label for="username">EMAIL/SỐ ĐIỆN THOẠI</label>
                        <input type="text" id="username" name="username" required>
                        <p id="emailError" style="color: red; display: none; font-size: 12px; margin-top: 5px; font-weight: 500;">* Email sai định dạng</p>
                    </div>
                    
                    <div class="input-row">
                        <div class="input-group">
                            <label for="password">MẬT KHẨU</label>
                            <input type="password" id="password" name="password" required>
                            <p id="passError" style="color: red; display: none; font-size: 12px; margin-top: 5px; font-weight: 500;">* Mật khẩu phải từ 8 ký tự, có 1 chữ IN HOA và 1 số</p>
                        </div>
                        <div class="input-group">
                            <label for="re-password">NHẬP LẠI MẬT KHẨU</label>
                            <input type="password" id="re-password" name="re-password" required>
                            <p id="rePassError" style="color: red; display: none; font-size: 12px; margin-top: 5px; font-weight: 500;">* Mật khẩu nhập lại không khớp!</p>
                        </div>
                    </div>
                    <button type="submit" id="submitRegBtn" class="login-button">ĐĂNG KÝ</button>
                </form>
                
                <p class="signup-text">
                    Bạn đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
                </p>
            </div>
        </div>
    </div>

    <script>
    document.getElementById('submitRegBtn').addEventListener('click', function(event) {
        let hopLe = true; 
        
        const email = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const rePass = document.getElementById('re-password').value; // Lấy thêm giá trị nhập lại
        
        // 1. Kiểm tra Email
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            document.getElementById('emailError').style.display = 'block';
            hopLe = false; 
        } else {
            document.getElementById('emailError').style.display = 'none'; 
        }

        // 2. Kiểm tra Mật khẩu mới
        const passRegex = /^(?=.*[A-Z])(?=.*\d).{8,}$/;
        if (!passRegex.test(pass)) {
            document.getElementById('passError').style.display = 'block';
            hopLe = false;
        } else {
            document.getElementById('passError').style.display = 'none';
        }

        // 3. Kiểm tra Mật khẩu nhập lại CÓ KHỚP KHÔNG
        if (pass !== rePass || rePass === "") {
            document.getElementById('rePassError').style.display = 'block';
            hopLe = false;
        } else {
            document.getElementById('rePassError').style.display = 'none';
        }

        if (!hopLe) {
            event.preventDefault(); // Chặn form nếu có lỗi
        }
    });
</script>

</body>
</html>
