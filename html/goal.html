<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mục Tiêu - MoneyMind</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/goal.css">
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="../css/modal.css">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <a href="home.html" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
                <img src="../assets/icon/logo.png" alt="MoneyMind">
                <span>MoneyMind</span>
            </a>
        </div>
        <div class="nav-right-group">
            <ul class="nav-links">
                <li><a href="category.html">Danh mục</a></li>
                <li><a href="transaction.html">Giao dịch</a></li>
                <li><a href="goal.html" class="active-link">Mục tiêu</a></li>
            </ul>
            <div class="nav-icons">
                <img src="../assets/icon/bell.png" alt="Notification" class="icon">
                <img src="../assets/icon/avatar.png" alt="User" class="avatar-img">
            </div>
        </div>
    </nav>

    <main class="goal-container">
        <h1 class="page-title">MỤC TIÊU CHI TIÊU</h1>

        <div class="top-actions">
            <button class="btn-pill-gray" onclick="showModal('addGoalModal')">Đặt mục tiêu</button>
        </div>

        <!-- Tiến độ -->
        <section class="goal-section">
            <h2 class="section-heading">TIẾN ĐỘ CÁC MỤC</h2>
            <div id="progressList"></div>
        </section>

        <!-- Mục tiêu hiện tại -->
        <section class="goal-section">
            <h2 class="section-heading">MỤC TIÊU HIỆN TẠI</h2>
            <div id="goalList"></div>
        </section>

        <!-- MODAL THÊM MỤC TIÊU -->
        <div class="modal-overlay" id="addGoalModal">
            <div class="modal-card form-card">
                <h2 class="form-title">Đặt mục tiêu mới</h2>

                <div class="form-group">
                    <label>Tên mục tiêu</label>
                    <input type="text" id="goalName" class="form-input" placeholder="VD: Ăn uống, Giải trí...">
                </div>

                <div class="form-group">
                    <label>Danh mục</label>
                    <select class="form-input" id="goalCategory">
                        <option value="">-- Không chọn (Tổng hợp) --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Hạn mức tối đa (VNĐ)</label>
                    <input type="number" id="goalAmount" class="form-input" placeholder="Nhập số tiền">
                </div>

                <div class="form-group">
                    <label>Từ ngày</label>
                    <input type="date" id="goalStartDate" class="form-input">
                </div>

                <div class="form-group">
                    <label>Đến ngày</label>
                    <input type="date" id="goalEndDate" class="form-input">
                </div>

                <div class="modal-btns">
                    <button class="btn-form-cancel" onclick="closeModal('addGoalModal')">HỦY</button>
                    <button class="btn-form-apply" onclick="addGoal()">LƯU</button>
                </div>
            </div>
        </div>

        <!-- MODAL SỬA MỤC TIÊU -->
        <div class="modal-overlay" id="editGoalModal">
            <div class="modal-card form-card">
                <h2 class="form-title">Sửa mục tiêu</h2>
                <input type="hidden" id="editGoalId">

                <div class="form-group">
                    <label>Tên mục tiêu</label>
                    <input type="text" id="editGoalName" class="form-input">
                </div>

                <div class="form-group">
                    <label>Hạn mức tối đa (VNĐ)</label>
                    <input type="number" id="editGoalAmount" class="form-input">
                </div>

                <div class="form-group">
                    <label>Từ ngày</label>
                    <input type="date" id="editGoalStartDate" class="form-input">
                </div>

                <div class="form-group">
                    <label>Đến ngày</label>
                    <input type="date" id="editGoalEndDate" class="form-input">
                </div>

                <div class="modal-btns">
                    <button class="btn-form-cancel" onclick="closeModal('editGoalModal')">HỦY</button>
                    <button class="btn-form-apply" onclick="updateGoal()">LƯU</button>
                </div>
            </div>
        </div>

    </main>

    <script src="../js/api.js"></script>
    <script src="../js/global-menu.js"></script>
    <script src="../js/model.js"></script>
    <script src="../js/goal.js"></script>
</body>
</html>
